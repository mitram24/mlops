# Bring the prediction API up with:  docker compose up --build
# Then open http://localhost:8000/docs
services:
  api:
    build: .
    image: fifa-player-rating-api:latest
    container_name: fifa-player-rating-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/data/06_models
    restart: unless-stopped

  # Optional: MLflow tracking UI over the local file store.
